<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <meta name="site-baseurl" content="{{ site.baseurl }}">
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("site-theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = storedTheme || (prefersDark ? "dark" : "light");
          if (sessionStorage.getItem("page-transition-active") === "true") {
            document.documentElement.classList.add("is-page-transition-arriving");
          }
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body class="layout-{{ page.layout | default: 'default' }}">
    {% include header.html %}
    <div class="page-transition" data-page-transition role="status" aria-live="polite" aria-label="페이지 이동 중">
      <div class="page-transition__inner">
        <svg class="page-transition__runner" viewBox="0 0 64 64" aria-hidden="true">
          <g class="page-transition__runner-bob">
            <rect x="27" y="4" width="12" height="12" rx="1"></rect>
            <rect x="24" y="18" width="17" height="20" rx="1"></rect>
            <g class="page-transition__runner-arm page-transition__runner-arm--front">
              <rect x="39" y="20" width="7" height="17" rx="1"></rect>
            </g>
            <g class="page-transition__runner-arm page-transition__runner-arm--back">
              <rect x="18" y="19" width="7" height="17" rx="1"></rect>
            </g>
            <g class="page-transition__runner-leg page-transition__runner-leg--front">
              <rect x="35" y="36" width="8" height="20" rx="1"></rect>
              <rect x="38" y="52" width="15" height="7" rx="1"></rect>
            </g>
            <g class="page-transition__runner-leg page-transition__runner-leg--back">
              <rect x="22" y="36" width="8" height="20" rx="1"></rect>
              <rect x="12" y="52" width="15" height="7" rx="1"></rect>
            </g>
          </g>
        </svg>
        <p class="page-transition__tip" data-page-transition-tip>코드는 미래의 나에게 쓰는 편지입니다.</p>
        <div class="page-transition__bar" aria-hidden="true">
          <span data-page-transition-progress></span>
        </div>
      </div>
    </div>
    <div class="site-frame">
      {% include sidebar.html %}
      <main class="site-main" id="content">
        {{ content }}
      </main>
    </div>
    {% include footer.html %}
    <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
    {% if page.extra_js %}
      {% for script in page.extra_js %}
        <script src="{{ script | relative_url }}" defer></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
