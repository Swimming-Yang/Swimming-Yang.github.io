---
layout: default
---

<article class="page-shell{% if page.wide or page.layout == 'coding_topic' %} page-shell--wide{% endif %}">
  <header class="page-hero">
    <p class="section-kicker">Archive</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
