---
layout: default
---

<article class="post">
  <header class="post__header">
    <p class="post__meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      {% if page.categories.size > 0 %}
        <span>{{ page.categories | join: ", " }}</span>
      {% endif %}
    </p>
    <h1>{{ page.title }}</h1>
    {% if page.tags.size > 0 %}
      <div class="tags">
        {% for tag in page.tags %}
          <span>{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="content">
    {{ content }}
  </div>
</article>
